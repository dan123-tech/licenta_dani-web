# SQL Server for Database Settings (Layer: SQL Server)
# Use when you want to connect an external SQL Server (e.g. for Users/Cars/Reservations layer).
#
# Start:  docker compose -f docker-compose.sqlserver.yml up -d
# Stop:   docker compose -f docker-compose.sqlserver.yml down
# Logs:   docker compose -f docker-compose.sqlserver.yml logs -f sqlserver
#
# --- CONNECTION INFO (use these in Database Settings → Connect to SQL Server) ---
# Host:         localhost or 127.0.0.1  (use 127.0.0.1 if localhost fails on Windows)
#               Use "sqlserver" only if your app runs inside Docker on the same network.
# Port:         1433
# Database:     FleetStream (or "master" until seed creates FleetStream)
# Username:     sa
# Password:     YourStrong!Pass123
#
# If connection fails: ensure the container is running (docker compose -f docker-compose.sqlserver.yml up -d)
# and wait ~15 seconds after start. Try Host 127.0.0.1 if localhost gives timeout/refused.
#
# After first start, run the seed script to create the DB and a login user:
#   node scripts/seed-sqlserver.js
#
# Optional: use app login instead of sa (created by seed script):
#   Username:   fleetstream_app
#   Password:   AppPass!123

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fleetstream-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Pass123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    # Healthcheck optional; remove if your image has no sqlcmd
    # healthcheck:
    #   test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"YourStrong!Pass123\" -C -Q \"SELECT 1\" || exit 1"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 30s

volumes:
  sqlserver_data:
