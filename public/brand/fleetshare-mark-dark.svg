<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <!-- Gradient: rear/dark → front/electric-blue -->
    <linearGradient id="g-car-dk" x1="10" y1="53" x2="71" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1d4ed8"/>
      <stop offset="55%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="80" height="80" rx="18" fill="#0c1220"/>

  <!--
    One single continuous closed path — the full car silhouette.

    Segments:
      rear face (vertical) → trunk angle →
      rear windscreen (smooth cubic bezier) →
      roofline (subtle arc via cubic bezier) →
      front windscreen (smooth cubic bezier) →
      flat hood → front face → bumper →
      front sill → [front wheel arch Q] →
      body sill → [rear wheel arch Q] → Z (closes rear sill)
  -->
  <path
    d="
      M 10,46
      L 10,41
      L 13,39
      C 17,34 20,29 26,28
      C 30,26 46,26 52,27
      C 58,27 63,32 65,36
      L 69,36
      L 71,41
      L 70,46
      L 65,46
      Q 57,61 49,46
      L 29,46
      Q 20,61 11,46
      Z
    "
    fill="none"
    stroke="url(#g-car-dk)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
